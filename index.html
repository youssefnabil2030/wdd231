<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Course Management System - Track and manage your academic courses">
    <title>Course Management System</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="header">
        <nav class="container">
            <div class="nav-content">
                <div class="logo">
                    <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="graduation-cap">
                        <path d="M22 10v6M2 10l10-5 10 5-10 5z"/>
                        <path d="M6 12v5c3 3 9 3 12 0v-5"/>
                    </svg>
                    <h1>Course Management</h1>
                </div>
            </div>
        </nav>
    </header>

    <main class="container">
        <div class="hero">
            <h2>My Courses</h2>
            <p>Track your academic progress and manage your course load</p>
            <img src="youssef.webp" alt="student image" style="width:30%;height:30%">
        </div>

        <div class="credit-counter">
            <h2>Total Credits</h2>
            <p id="total-credits">0</p>
        </div>

        <div class="subject-filter" id="subject-filter">
            <button class="filter-btn active" data-subject="all">All Courses</button>
        </div>

        <div class="course-grid" id="course-list"></div>
    </main>

    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <p>&copy; <span id="current-year"></span> Course Management System. All rights reserved.</p>
                <p>Last Modified: <span id="last-modified"></span></p>
            </div>
        </div>
    </footer>

    <script type="module" src="main.js"></script>
</body>
</html>
